# Server Configuration
server.port=${PORT:8080}
spring.application.name=omnicare-backend

# Database Configuration (PostgreSQL)
# Railway provides DATABASE_PUBLIC_URL in postgresql:// format
# We need to convert it to jdbc:postgresql:// format
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/omnicaredb}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console (disabled for PostgreSQL)
spring.h2.console.enabled=false

# JWT Configuration
jwt.secret=${JWT_SECRET:omnicare-secret-key-change-this-in-production-to-a-very-long-secure-random-string}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Logging
logging.level.com.omnicare=INFO
logging.level.org.springframework.security=INFO
